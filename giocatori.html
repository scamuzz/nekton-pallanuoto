<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="nekton.jpeg" type="image/jpeg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>👥 Giocatori · Nekton</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; overflow-x: hidden; }
    body { font-family: 'Segoe UI', sans-serif; background: #e8f4fd; min-height: 100vh; }

    .header {
      background: linear-gradient(160deg, #012AFE 0%, #0055cc 40%, #00b4d8 100%);
      color: white; padding: 36px 20px 24px;
      text-align: center; position: relative; overflow: hidden;
    }
    .header::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse 60% 40% at 20% 30%, rgba(255,255,255,0.10), transparent);
    }
    .back-link {
      position: absolute; top: 14px; left: 14px;
      background: rgba(255,255,255,0.25); border-radius: 20px;
      padding: 7px 15px; font-size: 0.76rem; font-weight: 700;
      color: white; text-decoration: none; z-index: 2; backdrop-filter: blur(4px);
    }
    .back-link:hover { background: rgba(255,255,255,0.40); }
    .pin-btn {
      position: absolute; top: 14px; right: 14px;
      background: rgba(255,255,255,0.25); border: none; border-radius: 50%;
      width: 40px; height: 40px; font-size: 1.3rem; cursor: pointer; z-index: 2;
      backdrop-filter: blur(4px); color: white; transition: background 0.2s;
    }
    .pin-btn:hover { background: rgba(255,255,255,0.40); }
    .header .icons { font-size: 3rem; display: block; margin-bottom: 10px; position: relative; }
    .header h1 { font-size: 1.6rem; font-weight: 800; position: relative; }
    .header .subtitle { font-size: 0.82rem; opacity: 0.9; margin-top: 6px; position: relative; }
    .sync-status { display: flex; align-items: center; justify-content: center;
      gap: 6px; font-size: 0.7rem; margin-top: 10px; opacity: 0.95; position: relative; }
    .sync-dot { width: 8px; height: 8px; border-radius: 50%;
      background: white; animation: blink 1.5s infinite; flex-shrink: 0; }
    .sync-dot.connected { background: #69f0ae; animation: none; }
    .sync-dot.error { background: #ff5252; animation: none; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

    .wave-divider { display: block; line-height: 0; overflow: hidden;
      background: linear-gradient(160deg, #012AFE 0%, #0055cc 40%, #00b4d8 100%); }
    .wave-divider svg { display: block; width: 100%; }
    .container { max-width: 540px; margin: 0 auto; padding: 16px 12px 64px; }

    /* FILTRI GRUPPO */
    .filter-row {
      display: flex; gap: 8px; margin-bottom: 18px; overflow-x: auto;
      padding-bottom: 4px; scrollbar-width: none;
    }
    .filter-row::-webkit-scrollbar { display: none; }
    .filter-btn {
      background: white; border: 2px solid #b3d9f7; border-radius: 20px;
      padding: 7px 14px; font-size: 0.74rem; font-weight: 700; color: #006994;
      cursor: pointer; white-space: nowrap; transition: all 0.2s; font-family: inherit;
    }
    .filter-btn.active, .filter-btn:hover {
      background: linear-gradient(135deg, #006994, #00b4d8); color: white; border-color: transparent;
    }

    /* SEZIONE GRUPPO */
    .section-title {
      font-size: 0.78rem; font-weight: 800; color: #006994;
      text-transform: uppercase; letter-spacing: 1px; margin: 20px 0 14px 2px;
      display: flex; align-items: center; gap: 6px;
    }
    .section-title::after { content: ''; flex: 1; height: 2px;
      background: linear-gradient(90deg, #b3d9f7 0%, transparent 100%); }

    /* PANNELLO AGGIUNTA (solo admin) */
    .add-panel {
      display: none; background: #fff8e1; border-radius: 14px;
      padding: 14px; margin-bottom: 14px; border: 2px solid #ffe082;
    }
    .add-panel.visible { display: block; }
    .add-panel h4 { font-size: 0.74rem; color: #f57f17; text-transform: uppercase;
      letter-spacing: 0.9px; font-weight: 800; margin-bottom: 10px; }
    .add-row { display: flex; gap: 8px; }
    .add-input {
      flex: 1; border: 1.5px solid #ffe082; border-radius: 10px;
      padding: 9px 12px; font-size: 0.86rem; font-family: inherit; color: #333; outline: none; background: white;
    }
    .add-input:focus { border-color: #ffb300; }
    .add-btn-small {
      background: linear-gradient(135deg, #006994, #00b4d8); color: white;
      border: none; border-radius: 10px; padding: 9px 16px; font-size: 0.86rem;
      font-weight: 700; cursor: pointer; font-family: inherit; white-space: nowrap;
    }
    .add-btn-small:hover { opacity: 0.9; }

    /* LISTA GIOCATORI */
    .player-list { margin-bottom: 8px; }
    .player-item {
      background: white; border-radius: 12px; padding: 11px 14px;
      margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 2px 10px rgba(0,105,148,0.06); border: 2px solid #ddeeff;
    }
    .player-name { font-size: 0.88rem; font-weight: 700; color: #1a3a5c; }
    .player-group-badge {
      font-size: 0.62rem; font-weight: 800; padding: 2px 8px; border-radius: 8px;
      margin-left: 8px;
    }
    .player-group-badge.acquagol { background: #e0f7fa; color: #006994; }
    .player-group-badge.u13 { background: #fff3e0; color: #e65100; }
    .player-group-badge.senior { background: #e8eaf6; color: #1a3a5c; }
    .player-del-btn {
      background: none; border: none; color: #b3d9f7; cursor: pointer;
      font-size: 1rem; transition: color 0.2s; padding: 2px 4px;
    }
    .player-del-btn:hover { color: #e53935; }

    .no-items {
      text-align: center; font-size: 0.88rem; color: #90a4ae; font-style: italic;
      padding: 24px 10px; background: white; border-radius: 14px;
      border: 2px dashed #ddeeff; margin-bottom: 16px;
    }

    /* PIN MODAL */
    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      z-index: 100; align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: white; border-radius: 20px; padding: 28px 24px;
      max-width: 300px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.3); text-align: center;
    }
    .modal h3 { font-size: 1rem; font-weight: 800; color: #006994; margin-bottom: 8px; }
    .modal p { font-size: 0.78rem; color: #607d8b; margin-bottom: 16px; }
    .modal input {
      width: 100%; border: 2px solid #b3d9f7; border-radius: 10px;
      padding: 11px 14px; font-size: 1rem; text-align: center;
      letter-spacing: 2px; outline: none; font-family: inherit;
    }
    .modal input:focus { border-color: #006994; }
    .modal-btns { display: flex; gap: 10px; margin-top: 14px; }
    .modal-btn { flex: 1; padding: 11px; border: none; border-radius: 10px;
      font-size: 0.86rem; font-weight: 700; cursor: pointer; font-family: inherit; }
    .modal-btn.primary { background: linear-gradient(135deg, #006994, #00b4d8); color: white; }
    .modal-btn.secondary { background: #eceff1; color: #607d8b; }
    .modal-error { font-size: 0.75rem; color: #e53935; margin-top: 8px; }

    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px);
      background: #006994; color: white; padding: 10px 22px; border-radius: 24px;
      font-size: 0.83rem; font-weight: 600; transition: transform 0.3s ease; z-index: 999;
      box-shadow: 0 6px 24px rgba(0,105,148,0.3); white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .page-footer { text-align: center; font-size: 0.7rem; color: #aabbc8; padding: 20px 0; }
  </style>
</head>
<body>

<div class="header">
  <a class="back-link" href="index.html">&#8592; Home</a>
  <button class="pin-btn" id="pin-btn">🔒</button>
  <span class="icons">👥</span>
  <h1>Liste Giocatori</h1>
  <div class="subtitle">Acquagol · U13 · Senior</div>
  <div class="sync-status">
    <div class="sync-dot" id="sync-dot"></div>
    <span id="sync-label">Connessione in corso…</span>
  </div>
</div>

<div class="wave-divider">
  <svg viewBox="0 0 1440 72" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M0,36 C180,72 360,0 540,36 C720,72 900,0 1080,36 C1260,72 1380,12 1440,36 L1440,72 L0,72 Z" fill="#e8f4fd"/>
  </svg>
</div>

<div class="container">

  <!-- FILTRI GRUPPO -->
  <div class="filter-row">
    <button class="filter-btn active" data-group="tutti">Tutti</button>
    <button class="filter-btn" data-group="acquagol">🌊 Acquagol</button>
    <button class="filter-btn" data-group="u13">🏊 U13</button>
    <button class="filter-btn" data-group="senior">🤽 Senior</button>
  </div>

  <div id="players-container"></div>

</div>

<div class="page-footer">👥 Giocatori · Nekton Pallanuoto</div>
<div class="toast" id="toast"></div>

<!-- PIN MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3>🔑 Accesso Amministratore</h3>
    <p>Inserisci il PIN per gestire i giocatori</p>
    <input type="password" id="pin-input" placeholder="••••••••" maxlength="20" autocomplete="current-password"/>
    <div class="modal-error" id="modal-error"></div>
    <div class="modal-btns">
      <button class="modal-btn secondary" id="modal-cancel">Annulla</button>
      <button class="modal-btn primary" id="modal-confirm">Accedi</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey: "AIzaSyAfOMeAkXUIandLUhCR8nfyELOPVRyD3WU",
  authDomain: "lista-spesa-b9eb1.firebaseapp.com",
  databaseURL: "https://lista-spesa-b9eb1-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "lista-spesa-b9eb1",
  storageBucket: "lista-spesa-b9eb1.firebasestorage.app",
  messagingSenderId: "468690890938",
  appId: "1:468690890938:web:048be7f27779d8862d9283"
});
const db = firebase.database();
const giocatoriRef = db.ref('nekton/giocatori');

const GROUPS = [
  { key: 'acquagol', label: '🌊 Acquagol', shortLabel: 'Acquagol' },
  { key: 'u13',      label: '🏊 U13',      shortLabel: 'U13' },
  { key: 'senior',   label: '🤽 Senior',   shortLabel: 'Senior' }
];

function isManager() { return sessionStorage.getItem('nektonManager') === '1'; }
function setManager(v) { sessionStorage.setItem('nektonManager', v ? '1' : '0'); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function showToast(msg) {
  const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2600);
}

let allPlayers = {};
let activeGroup = 'tutti';

db.ref('.info/connected').on('value', snap => {
  const dot = document.getElementById('sync-dot'); const lbl = document.getElementById('sync-label');
  if (snap.val()) { dot.className = 'sync-dot connected'; lbl.textContent = '✅ Sincronizzato in tempo reale'; }
  else { dot.className = 'sync-dot error'; lbl.textContent = '❌ Offline – riconnessione…'; }
});

giocatoriRef.on('value', snap => { allPlayers = snap.val() || {}; render(); });

function render() {
  const container = document.getElementById('players-container');
  container.innerHTML = '';
  const admin = isManager();

  const visibleGroups = activeGroup === 'tutti' ? GROUPS : GROUPS.filter(g => g.key === activeGroup);

  visibleGroups.forEach(group => {
    const groupData = allPlayers[group.key] || {};
    const entries = Object.entries(groupData).sort((a,b) => (a[1].nome||'').localeCompare(b[1].nome||''));

    // Titolo sezione
    const title = document.createElement('div');
    title.className = 'section-title';
    title.textContent = group.label;
    container.appendChild(title);

    // Pannello aggiunta (solo admin)
    const addPanel = document.createElement('div');
    addPanel.className = 'add-panel' + (admin ? ' visible' : '');
    addPanel.innerHTML = `
      <h4>➕ Aggiungi giocatore</h4>
      <div class="add-row">
        <input type="text" class="add-input" id="add-input-${group.key}" placeholder="Nome e cognome…" maxlength="60"/>
        <button class="add-btn-small" data-group="${group.key}">Aggiungi</button>
      </div>`;
    container.appendChild(addPanel);

    // Lista giocatori
    const list = document.createElement('div');
    list.className = 'player-list';
    if (entries.length === 0) {
      list.innerHTML = '<div class="no-items">Nessun giocatore in questa lista. 💤</div>';
    } else {
      entries.forEach(([id, p]) => {
        const item = document.createElement('div');
        item.className = 'player-item';
        item.innerHTML = `
          <div style="display:flex;align-items:center;">
            <span class="player-name">${esc(p.nome)}</span>
            <span class="player-group-badge ${group.key}">${esc(group.shortLabel)}</span>
          </div>
          ${admin ? `<button class="player-del-btn" data-group="${group.key}" data-id="${esc(id)}" title="Rimuovi">🗑️</button>` : ''}`;
        list.appendChild(item);
      });
    }
    container.appendChild(list);
  });

  // Listener aggiunta
  if (admin) {
    container.querySelectorAll('.add-btn-small').forEach(btn => {
      btn.addEventListener('click', () => {
        const grp = btn.dataset.group;
        const input = document.getElementById('add-input-' + grp);
        const nome = input.value.trim();
        if (!nome) { showToast('⚠️ Inserisci il nome del giocatore!'); return; }
        giocatoriRef.child(grp).push({ nome }).then(() => {
          input.value = '';
          showToast('✅ Giocatore aggiunto!');
        }).catch(() => showToast('❌ Errore nel salvataggio'));
      });
    });
    container.querySelectorAll('.player-del-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        if (confirm('Rimuovere questo giocatore dalla lista?')) {
          giocatoriRef.child(btn.dataset.group).child(btn.dataset.id).remove()
            .then(() => showToast('✅ Giocatore rimosso'))
            .catch(() => showToast('❌ Errore nella rimozione'));
        }
      });
    });
  }
}

// Filtri gruppo
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeGroup = btn.dataset.group;
    render();
  });
});

// PIN
const pinBtn = document.getElementById('pin-btn');
const overlay = document.getElementById('modal-overlay');
function updatePinBtn() { pinBtn.textContent = isManager() ? '🔐' : '🔒'; }
updatePinBtn();

pinBtn.addEventListener('click', () => {
  if (isManager()) {
    setManager(false); updatePinBtn(); render(); showToast('🔐 Logout gestore effettuato');
  } else {
    document.getElementById('modal-error').textContent = '';
    document.getElementById('pin-input').value = '';
    overlay.classList.add('open');
    setTimeout(() => document.getElementById('pin-input').focus(), 100);
  }
});
document.getElementById('modal-cancel').addEventListener('click', () => overlay.classList.remove('open'));
overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('open'); });
document.getElementById('modal-confirm').addEventListener('click', checkPin);
document.getElementById('pin-input').addEventListener('keydown', e => { if (e.key === 'Enter') checkPin(); });

function checkPin() {
  if (document.getElementById('pin-input').value === 'nekton2025') {
    setManager(true); overlay.classList.remove('open'); updatePinBtn();
    render(); showToast('🔓 Modalità gestore attiva');
  } else { document.getElementById('modal-error').textContent = '❌ PIN non corretto'; }
}
</script>
</body>
</html>

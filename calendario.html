<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="nekton.jpeg" type="image/jpeg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>📆 Calendario Partite · Nekton</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; overflow-x: hidden; }
    body { font-family: 'Segoe UI', sans-serif; background: #e8f4fd; min-height: 100vh; }

    .header {
      background: linear-gradient(160deg, #012AFE 0%, #0055cc 40%, #00b4d8 100%);
      color: white; padding: 36px 20px 24px;
      text-align: center; position: relative; overflow: hidden;
    }
    .header::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse 60% 40% at 20% 30%, rgba(255,255,255,0.10), transparent);
    }
    .back-link {
      position: absolute; top: 14px; left: 14px;
      background: rgba(255,255,255,0.25); border-radius: 20px;
      padding: 7px 15px; font-size: 0.76rem; font-weight: 700;
      color: white; text-decoration: none; z-index: 2; backdrop-filter: blur(4px);
    }
    .back-link:hover { background: rgba(255,255,255,0.40); }
    .pin-btn {
      position: absolute; top: 14px; right: 14px;
      background: rgba(255,255,255,0.25); border: none; border-radius: 50%;
      width: 40px; height: 40px; font-size: 1.3rem; cursor: pointer; z-index: 2;
      backdrop-filter: blur(4px); color: white; transition: background 0.2s;
    }
    .pin-btn:hover { background: rgba(255,255,255,0.40); }
    .header .icons { font-size: 3rem; display: block; margin-bottom: 10px; position: relative; }
    .header h1 { font-size: 1.6rem; font-weight: 800; position: relative; }
    .header .subtitle { font-size: 0.82rem; opacity: 0.9; margin-top: 6px; position: relative; }
    .sync-status { display: flex; align-items: center; justify-content: center;
      gap: 6px; font-size: 0.7rem; margin-top: 10px; opacity: 0.95; position: relative; }
    .sync-dot { width: 8px; height: 8px; border-radius: 50%;
      background: white; animation: blink 1.5s infinite; flex-shrink: 0; }
    .sync-dot.connected { background: #69f0ae; animation: none; }
    .sync-dot.error { background: #ff5252; animation: none; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

    .wave-divider { display: block; line-height: 0; overflow: hidden;
      background: linear-gradient(160deg, #012AFE 0%, #0055cc 40%, #00b4d8 100%); }
    .wave-divider svg { display: block; width: 100%; }
    .container { max-width: 540px; margin: 0 auto; padding: 16px 12px 64px; }

    /* FILTRI */
    .filter-row {
      display: flex; gap: 8px; margin-bottom: 18px; overflow-x: auto;
      padding-bottom: 4px; scrollbar-width: none;
    }
    .filter-row::-webkit-scrollbar { display: none; }
    .filter-btn {
      background: white; border: 2px solid #b3d9f7; border-radius: 20px;
      padding: 7px 14px; font-size: 0.74rem; font-weight: 700; color: #006994;
      cursor: pointer; white-space: nowrap; transition: all 0.2s; font-family: inherit;
    }
    .filter-btn.active, .filter-btn:hover {
      background: linear-gradient(135deg, #006994, #00b4d8); color: white; border-color: transparent;
    }

    /* PARTITA CARDS */
    .partita-card {
      background: white; border-radius: 16px; padding: 16px 16px 14px;
      margin-bottom: 12px; box-shadow: 0 3px 14px rgba(0,105,148,0.07);
      border: 2px solid #ddeeff; border-left: 5px solid #006994;
      position: relative; transition: opacity 0.2s;
    }
    .partita-card.passata { opacity: 0.65; border-left-color: #b0bec5; background: #f9fafb; }
    .partita-card.festa { border-left-color: #f06292; border-color: #fce4ec; }
    .partita-card.festa .campionato-badge { background: #fce4ec; color: #c2185b; border-color: #f48fb1; }
    .partita-descrizione { font-size: 0.82rem; color: #607d8b; margin-top: 5px; line-height: 1.55; }
    .partita-card.prossima { border-left-color: #00b4d8; }

    .partita-top {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px;
    }
    .campionato-badge {
      font-size: 0.62rem; font-weight: 800; padding: 3px 10px; border-radius: 10px;
      background: #e3f2fd; color: #006994; border: 1.5px solid #b3d9f7;
    }
    .partita-data { font-size: 0.72rem; font-weight: 700; color: #90a4ae; }
    .partita-avversario {
      font-size: 0.98rem; font-weight: 800; color: #1a3a5c; margin-bottom: 5px;
    }
    .partita-info {
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    }
    .partita-luogo {
      font-size: 0.76rem; font-weight: 700; padding: 3px 10px; border-radius: 8px;
    }
    .partita-luogo.casa { background: #e0f7fa; color: #006994; }
    .partita-luogo.trasferta { background: #fff3e0; color: #e65100; }
    .partita-ora { font-size: 0.76rem; color: #607d8b; font-weight: 600; }
    .partita-risultato {
      font-size: 0.82rem; font-weight: 800; color: #006994;
      background: #e3f2fd; padding: 2px 10px; border-radius: 8px;
    }
    .partita-date-row { display: flex; align-items: center; gap: 4px; }
    .partita-admin-btns { display: flex; align-items: center; gap: 4px; }
    .partita-del-btn, .partita-edit-btn {
      background: none; border: none; color: #b3d9f7; cursor: pointer;
      font-size: 0.9rem; transition: color 0.2s; padding: 2px 3px; line-height: 1;
    }
    .partita-del-btn:hover { color: #e53935; }
    .partita-edit-btn:hover { color: #ffb300; }
    .partita-trasferta-info {
      font-size: 0.72rem; color: #e65100; margin-top: 5px; font-weight: 600;
    }

    .no-items {
      text-align: center; font-size: 0.88rem; color: #90a4ae; font-style: italic;
      padding: 30px 10px; background: white; border-radius: 16px;
      border: 2px dashed #ddeeff; margin-bottom: 16px;
    }
    .section-title {
      font-size: 0.78rem; font-weight: 800; color: #006994;
      text-transform: uppercase; letter-spacing: 1px; margin: 20px 0 14px 2px;
      display: flex; align-items: center; gap: 6px;
    }
    .section-title::after { content: ''; flex: 1; height: 2px;
      background: linear-gradient(90deg, #b3d9f7 0%, transparent 100%); }

    /* PANNELLO GESTORE */
    .manager-panel {
      display: none; background: #fff8e1; border-radius: 18px;
      padding: 18px; margin-bottom: 18px; border: 2px solid #ffe082;
    }
    .manager-panel.visible { display: block; }
    .manager-panel h3 { font-size: 0.76rem; color: #f57f17; text-transform: uppercase;
      letter-spacing: 0.9px; font-weight: 800; margin-bottom: 12px; }
    .form-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
    .form-group { margin-bottom: 8px; }
    .form-group label { font-size: 0.75rem; font-weight: 700; color: #555; display: block; margin-bottom: 4px; }
    .form-input {
      width: 100%; border: 1.5px solid #ffe082; border-radius: 10px;
      padding: 9px 12px; font-size: 0.86rem; font-family: inherit; color: #333; outline: none; background: white;
    }
    .form-input:focus { border-color: #ffb300; }
    select.form-input { cursor: pointer; }
    .pub-btn {
      flex: 1; background: linear-gradient(135deg, #006994, #00b4d8); color: white;
      border: none; border-radius: 10px; padding: 11px; font-size: 0.86rem;
      font-weight: 700; cursor: pointer; margin-top: 4px; font-family: inherit;
    }
    .pub-btn:hover { opacity: 0.9; }
    .cancel-edit-btn {
      flex: 1; background: #eceff1; color: #607d8b;
      border: none; border-radius: 10px; padding: 11px; font-size: 0.86rem;
      font-weight: 700; cursor: pointer; margin-top: 4px; font-family: inherit; display: none;
    }
    .cancel-edit-btn:hover { background: #cfd8dc; }
    .pub-btn-row { display: flex; gap: 8px; }

    /* PIN MODAL */
    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      z-index: 100; align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: white; border-radius: 20px; padding: 28px 24px;
      max-width: 300px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.3); text-align: center;
    }
    .modal h3 { font-size: 1rem; font-weight: 800; color: #006994; margin-bottom: 8px; }
    .modal p { font-size: 0.78rem; color: #607d8b; margin-bottom: 16px; }
    .modal input {
      width: 100%; border: 2px solid #b3d9f7; border-radius: 10px;
      padding: 11px 40px 11px 14px; font-size: 1rem; text-align: center;
      letter-spacing: 2px; outline: none; font-family: inherit;
    }
    .modal input:focus { border-color: #006994; }
    .pin-input-wrap { position: relative; }
    .pin-toggle { position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; font-size: 1.1rem; padding: 2px; line-height: 1; }
    .modal-btns { display: flex; gap: 10px; margin-top: 14px; }
    .modal-btn { flex: 1; padding: 11px; border: none; border-radius: 10px;
      font-size: 0.86rem; font-weight: 700; cursor: pointer; font-family: inherit; }
    .modal-btn.primary { background: linear-gradient(135deg, #006994, #00b4d8); color: white; }
    .modal-btn.secondary { background: #eceff1; color: #607d8b; }
    .modal-error { font-size: 0.75rem; color: #e53935; margin-top: 8px; }

    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px);
      background: #006994; color: white; padding: 10px 22px; border-radius: 24px;
      font-size: 0.83rem; font-weight: 600; transition: transform 0.3s ease; z-index: 999;
      box-shadow: 0 6px 24px rgba(0,105,148,0.3); white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .page-footer { text-align: center; font-size: 0.7rem; color: #aabbc8; padding: 20px 0; }

    /* CONVOCATI */
    .conv-toggle-btn {
      display: flex; align-items: center; gap: 6px;
      background: #e3f2fd; border: 1.5px solid #b3d9f7; border-radius: 10px;
      padding: 5px 11px; font-size: 0.74rem; font-weight: 700; color: #006994;
      cursor: pointer; font-family: inherit; margin-top: 10px; transition: background 0.2s;
    }
    .conv-toggle-btn:hover { background: #bbdefb; }
    .conv-section { display: none; margin-top: 10px; }
    .conv-section.open { display: block; }
    .conv-filter-row {
      display: flex; gap: 6px; margin-bottom: 10px; overflow-x: auto; padding-bottom: 2px; scrollbar-width: none;
    }
    .conv-filter-row::-webkit-scrollbar { display: none; }
    .conv-filter-btn {
      background: white; border: 1.5px solid #b3d9f7; border-radius: 14px;
      padding: 4px 10px; font-size: 0.70rem; font-weight: 700; color: #006994;
      cursor: pointer; white-space: nowrap; transition: all 0.2s; font-family: inherit;
    }
    .conv-filter-btn.active, .conv-filter-btn:hover {
      background: linear-gradient(135deg, #006994, #00b4d8); color: white; border-color: transparent;
    }
    .conv-list { display: flex; flex-wrap: wrap; gap: 6px; }
    .conv-chip {
      display: flex; align-items: center; gap: 5px;
      background: #e0f2f1; border: 1.5px solid #80cbc4; border-radius: 10px;
      padding: 4px 10px; font-size: 0.76rem; font-weight: 700; color: #006994;
    }
    .conv-chip.selected { background: linear-gradient(135deg, #006994, #00b4d8); color: white; border-color: transparent; }
    .conv-chip-remove {
      background: none; border: none; color: rgba(255,255,255,0.7); cursor: pointer;
      font-size: 0.8rem; padding: 0; line-height: 1;
    }
    .conv-chip-remove:hover { color: white; }
    .conv-player-btn {
      background: white; border: 1.5px solid #b3d9f7; border-radius: 10px;
      padding: 4px 10px; font-size: 0.74rem; font-weight: 700; color: #006994;
      cursor: pointer; font-family: inherit; transition: all 0.2s;
    }
    .conv-player-btn:hover { background: #e3f2fd; }
    .conv-player-btn.convocato { background: linear-gradient(135deg, #006994, #00b4d8); color: white; border-color: transparent; }
    .conv-empty { font-size: 0.78rem; color: #90a4ae; font-style: italic; }
    .conv-label { font-size: 0.70rem; font-weight: 800; color: #90a4ae;
      text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
    .conv-divider { border: none; border-top: 1.5px solid #e3f2fd; margin: 10px 0; }
  </style>
</head>
<body>

<div class="header">
  <a class="back-link" href="index.html">&#8592; Home</a>
  <button class="pin-btn" id="pin-btn">🔒</button>
  <span class="icons">📆</span>
  <h1>Calendario Partite</h1>
  <div class="subtitle">Tutti i campionati Nekton</div>
  <div class="sync-status">
    <div class="sync-dot" id="sync-dot"></div>
    <span id="sync-label">Connessione in corso…</span>
  </div>
</div>

<div class="wave-divider">
  <svg viewBox="0 0 1440 72" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M0,36 C180,72 360,0 540,36 C720,72 900,0 1080,36 C1260,72 1380,12 1440,36 L1440,72 L0,72 Z" fill="#e8f4fd"/>
  </svg>
</div>

<div class="container">

  <!-- PANNELLO GESTORE -->
  <div class="manager-panel" id="manager-panel">
    <h3>➕ Aggiungi Partita</h3>
    <div class="form-row">
      <div class="form-group" style="flex:1;min-width:120px;">
        <label>Data</label>
        <input type="date" class="form-input" id="f-data"/>
      </div>
      <div class="form-group" style="flex:1;min-width:100px;">
        <label>Ora</label>
        <input type="time" class="form-input" id="f-ora"/>
      </div>
    </div>
    <div class="form-group">
      <label>Campionato</label>
      <select class="form-input" id="f-campionato">
        <option value="Habawaba">Habawaba</option>
        <option value="U12">U12</option>
        <option value="U14">U14</option>
        <option value="U16">U16</option>
        <option value="U18">U18</option>
        <option value="Promozione">Prima Squadra Promozione</option>
        <option value="Festa">🎉 Festa / Evento</option>
      </select>
    </div>
    <div id="partita-fields">
      <div class="form-group">
        <label>Avversario</label>
        <input type="text" class="form-input" id="f-avversario" placeholder="Nome squadra avversaria…" maxlength="60"/>
      </div>
      <div class="form-row">
        <div class="form-group" style="flex:1;">
          <label>Casa / Trasferta</label>
          <select class="form-input" id="f-luogo">
            <option value="casa">🏠 Casa</option>
            <option value="trasferta">✈️ Trasferta</option>
          </select>
        </div>
        <div class="form-group" style="flex:1;">
          <label>Risultato (opz.)</label>
          <input type="text" class="form-input" id="f-risultato" placeholder="es. 5-3" maxlength="10"/>
        </div>
      </div>
      <div id="trasferta-fields" style="display:none;">
        <div class="form-group">
          <label>Città (trasferta)</label>
          <input type="text" class="form-input" id="f-citta" placeholder="es. Roma" maxlength="60"/>
        </div>
        <div class="form-group">
          <label>Indirizzo piscina</label>
          <input type="text" class="form-input" id="f-indirizzo" placeholder="es. Via Roma 1" maxlength="100"/>
        </div>
      </div>
    </div>
    <div id="festa-fields" style="display:none;">
      <div class="form-group">
        <label>Nome evento</label>
        <input type="text" class="form-input" id="f-nome-evento" placeholder="es. Festa fine stagione…" maxlength="60"/>
      </div>
      <div class="form-group">
        <label for="f-ora-evento">Orario evento</label>
        <input type="time" class="form-input" id="f-ora-evento"/>
      </div>
      <div class="form-group">
        <label>Descrizione (opz.)</label>
        <input type="text" class="form-input" id="f-descrizione" placeholder="es. Cena, premiazioni…" maxlength="120"/>
      </div>
    </div>
    <div class="pub-btn-row">
      <button class="pub-btn" id="add-btn">➕ Aggiungi partita</button>
      <button class="cancel-edit-btn" id="cancel-edit-btn">✕ Annulla modifica</button>
    </div>
  </div>

  <!-- FILTRI -->
  <div class="filter-row" id="filter-row">
    <button class="filter-btn active" data-filter="tutti">Tutti</button>
    <button class="filter-btn" data-filter="Habawaba">Habawaba</button>
    <button class="filter-btn" data-filter="U12">U12</button>
    <button class="filter-btn" data-filter="U14">U14</button>
    <button class="filter-btn" data-filter="U16">U16</button>
    <button class="filter-btn" data-filter="U18">U18</button>
    <button class="filter-btn" data-filter="Promozione">Promozione</button>
    <button class="filter-btn" data-filter="Festa">🎉 Festa</button>
  </div>

  <div class="section-title">🤽 Partite</div>
  <div id="calendario-container"></div>

</div>

<div class="page-footer">📆 Calendario · Nekton Pallanuoto</div>
<div class="toast" id="toast"></div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3>🔑 Accesso Gestore</h3>
    <p>Inserisci il PIN per gestire il calendario</p>
    <div class="pin-input-wrap">
      <input type="password" id="pin-input" placeholder="••••••••" maxlength="20" autocomplete="current-password"/>
      <button class="pin-toggle" id="pin-toggle" type="button" title="Mostra/Nascondi PIN">👁️</button>
    </div>
    <div class="modal-error" id="modal-error"></div>
    <div class="modal-btns">
      <button class="modal-btn secondary" id="modal-cancel">Annulla</button>
      <button class="modal-btn primary" id="modal-confirm">Accedi</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey: "AIzaSyAfOMeAkXUIandLUhCR8nfyELOPVRyD3WU",
  authDomain: "lista-spesa-b9eb1.firebaseapp.com",
  databaseURL: "https://lista-spesa-b9eb1-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "lista-spesa-b9eb1",
  storageBucket: "lista-spesa-b9eb1.firebasestorage.app",
  messagingSenderId: "468690890938",
  appId: "1:468690890938:web:048be7f27779d8862d9283"
});
const db = firebase.database();
const calRef = db.ref('nekton/calendario');
const giocatoriRef = db.ref('nekton/giocatori');
const convocatiRef = db.ref('nekton/convocati');

const GROUPS = [
  { key: 'acquagol', label: '🌊 Acquagol', shortLabel: 'Acquagol' },
  { key: 'u13',      label: '🏊 U13',      shortLabel: 'U13' },
  { key: 'senior',   label: '🤽 Senior',   shortLabel: 'Senior' }
];

function isManager() { return sessionStorage.getItem('nektonManager') === '1'; }
function setManager(v) { sessionStorage.setItem('nektonManager', v ? '1' : '0'); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function showToast(msg) {
  const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2600);
}

let allData = {};
let allPlayers = {};
let allConvocati = {};
let activeFilter = 'tutti';
let editingId = null;

db.ref('.info/connected').on('value', snap => {
  const dot = document.getElementById('sync-dot'); const lbl = document.getElementById('sync-label');
  if (snap.val()) { dot.className = 'sync-dot connected'; lbl.textContent = '✅ Sincronizzato in tempo reale'; }
  else { dot.className = 'sync-dot error'; lbl.textContent = '❌ Offline – riconnessione…'; }
});

calRef.on('value', snap => { allData = snap.val() || {}; render(); });
giocatoriRef.on('value', snap => { allPlayers = snap.val() || {}; render(); });
convocatiRef.on('value', snap => { allConvocati = snap.val() || {}; render(); });

function buildPlayerMap() {
  const map = {};
  GROUPS.forEach(grp => {
    const grpData = allPlayers[grp.key] || {};
    Object.entries(grpData).forEach(([pid, player]) => {
      map[pid] = { ...player, gruppo: grp.key };
    });
  });
  return map;
}

function render() {
  const today = new Date().toISOString().slice(0,10);
  const container = document.getElementById('calendario-container');
  let entries = Object.entries(allData)
    .filter(([, v]) => activeFilter === 'tutti' || v.campionato === activeFilter)
    .sort((a,b) => (a[1].data||'').localeCompare(b[1].data||''));

  if (entries.length === 0) {
    container.innerHTML = '<div class="no-items">Nessuna partita in programma. 💤</div>';
    return;
  }

  const playerMap = buildPlayerMap();

  container.innerHTML = '';
  entries.forEach(([id, p]) => {
    const isPast = p.data && p.data < today;
    const d = new Date(p.data + 'T12:00:00');
    const dateStr = isNaN(d) ? p.data : d.toLocaleDateString('it-IT', { weekday:'short', day:'2-digit', month:'short', year:'numeric' });
    const card = document.createElement('div');
    const isFesta = p.campionato === 'Festa';
    card.className = `partita-card${isPast ? ' passata' : ''}${isFesta ? ' festa' : ''}`;

    // Convocati della partita
    const convPartita = allConvocati[id] || {};
    const convCount = Object.keys(convPartita).length;

    card.innerHTML = `
      <div class="partita-top">
        <span class="campionato-badge">${esc(p.campionato)}</span>
        <div class="partita-date-row">
          <span class="partita-data">📅 ${esc(dateStr)}${p.ora ? ' – ' + esc(p.ora) : ''}</span>
          ${isManager() ? `
            <div class="partita-admin-btns">
              <button class="partita-edit-btn" data-id="${esc(id)}" title="Modifica">✏️</button>
              <button class="partita-del-btn" data-id="${esc(id)}" title="Elimina">🗑️</button>
            </div>` : ''}
        </div>
      </div>
      ${isFesta
        ?         `<div class="partita-avversario">🎉 ${esc(p.nomeEvento || 'Festa')}</div>
           ${p.descrizione ? `<div class="partita-descrizione">${esc(p.descrizione)}</div>` : ''}`
        : `<div class="partita-avversario">vs ${esc(p.avversario)}</div>
           <div class="partita-info">
             <span class="partita-luogo ${p.luogo === 'casa' ? 'casa' : 'trasferta'}">${p.luogo === 'casa' ? '🏠 Casa' : '✈️ Trasferta'}</span>
             ${p.risultato ? `<span class="partita-risultato">🏆 ${esc(p.risultato)}</span>` : ''}
           </div>
           ${p.luogo === 'trasferta' && (p.citta || p.indirizzo) ? `<div class="partita-trasferta-info">📍 ${[esc(p.citta), esc(p.indirizzo)].filter(Boolean).join(' – ')}</div>` : ''}`
      }
      <button class="conv-toggle-btn" data-id="${esc(id)}">
        🤽 Convocati ${convCount > 0 ? `(${convCount})` : ''}
      </button>
      <div class="conv-section" id="conv-${esc(id)}"></div>
    `;
    container.appendChild(card);
  });

  // Toggle convocati – lazy render on open
  container.querySelectorAll('.conv-toggle-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const partitaId = btn.dataset.id;
      const sec = document.getElementById('conv-' + partitaId);
      const isOpen = sec.classList.toggle('open');
      if (isOpen && sec.dataset.rendered !== 'true') {
        const convPartita = allConvocati[partitaId] || {};
        const playerMap = buildPlayerMap();
        const convNomi = Object.keys(convPartita).map(pid => {
          const pl = playerMap[pid];
          return pl ? { id: pid, nome: pl.nome, gruppo: pl.gruppo } : null;
        }).filter(Boolean);
        renderConvSection(partitaId, sec, convNomi, convPartita, playerMap);
        sec.dataset.rendered = 'true';
      }
    });
  });

  if (isManager()) {
    document.querySelectorAll('.partita-del-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        if (confirm('Eliminare questa partita?')) { calRef.child(btn.dataset.id).remove(); showToast('✅ Partita eliminata'); }
      });
    });
    document.querySelectorAll('.partita-edit-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = btn.dataset.id;
        const p = allData[id];
        if (!p) return;
        const isFesta = p.campionato === 'Festa';
        editingId = id;
        document.getElementById('f-data').value = p.data || '';
        document.getElementById('f-ora').value = p.ora || '';
        document.getElementById('f-ora-evento').value = isFesta ? (p.ora || '') : '';
        document.getElementById('f-campionato').value = p.campionato || 'Habawaba';
        document.getElementById('f-avversario').value = p.avversario || '';
        document.getElementById('f-luogo').value = p.luogo || 'casa';
        document.getElementById('f-risultato').value = p.risultato || '';
        document.getElementById('f-citta').value = p.citta || '';
        document.getElementById('f-indirizzo').value = p.indirizzo || '';
        document.getElementById('f-descrizione').value = p.descrizione || '';
        document.getElementById('f-nome-evento').value = isFesta ? (p.nomeEvento || '') : '';
        document.getElementById('trasferta-fields').style.display = p.luogo === 'trasferta' ? 'block' : 'none';
        toggleFestaFields(p.campionato === 'Festa');
        document.querySelector('.manager-panel h3').textContent = p.campionato === 'Festa' ? '✏️ Modifica Festa' : '✏️ Modifica Partita';
        document.getElementById('add-btn').textContent = '💾 Salva modifiche';
        document.getElementById('cancel-edit-btn').style.display = 'block';
        document.getElementById('manager-panel').scrollIntoView({ behavior: 'smooth' });
      });
    });
  }
}

function renderConvSection(partitaId, section, convNomi, convPartita, playerMap) {
  const admin = isManager();
  section.innerHTML = '';

  // Lista convocati attuali
  if (convNomi.length > 0) {
    const label = document.createElement('div');
    label.className = 'conv-label';
    label.textContent = '🤽 Convocati';
    section.appendChild(label);

    const list = document.createElement('div');
    list.className = 'conv-list';
    convNomi.forEach(({ id, nome }) => {
      const chip = document.createElement('div');
      chip.className = 'conv-chip selected';
      chip.innerHTML = `${esc(nome)}${admin ? `<button class="conv-chip-remove" data-pid="${esc(id)}" data-partita="${esc(partitaId)}" title="Rimuovi">✕</button>` : ''}`;
      list.appendChild(chip);
    });
    section.appendChild(list);
  } else {
    const empty = document.createElement('div');
    empty.className = 'conv-empty';
    empty.textContent = 'Nessun convocato selezionato.';
    section.appendChild(empty);
  }

  // Selezione giocatori (solo admin)
  if (admin) {
    const hr = document.createElement('hr');
    hr.className = 'conv-divider';
    section.appendChild(hr);

    const selLabel = document.createElement('div');
    selLabel.className = 'conv-label';
    selLabel.textContent = '🤽 Seleziona giocatori';
    section.appendChild(selLabel);

    // Filtri gruppo per selezione
    const filterRow = document.createElement('div');
    filterRow.className = 'conv-filter-row';
    const allGroups = [{ key: 'tutti', label: 'Tutti' }, ...GROUPS];
    let activeGroupFilter = 'tutti';

    allGroups.forEach(g => {
      const fb = document.createElement('button');
      fb.className = 'conv-filter-btn' + (g.key === 'tutti' ? ' active' : '');
      fb.textContent = g.label;
      fb.dataset.gkey = g.key;
      filterRow.appendChild(fb);
    });
    section.appendChild(filterRow);

    const playerArea = document.createElement('div');
    playerArea.className = 'conv-list';
    section.appendChild(playerArea);

    function renderPlayerSelection() {
      playerArea.innerHTML = '';
      const visibleGroups = activeGroupFilter === 'tutti' ? GROUPS : GROUPS.filter(g => g.key === activeGroupFilter);
      const visibleKeys = new Set(visibleGroups.map(g => g.key));
      let any = false;
      Object.entries(playerMap)
        .filter(([, pl]) => visibleKeys.has(pl.gruppo))
        .sort((a, b) => (a[1].nome||'').localeCompare(b[1].nome||''))
        .forEach(([pid, player]) => {
          any = true;
          const isConv = !!convPartita[pid];
          const pb = document.createElement('button');
          pb.className = 'conv-player-btn' + (isConv ? ' convocato' : '');
          pb.textContent = player.nome;
          pb.dataset.pid = pid;
          pb.dataset.partita = partitaId;
          playerArea.appendChild(pb);
        });
      if (!any) {
        playerArea.innerHTML = '<div class="conv-empty">Nessun giocatore disponibile.</div>';
      }
    }
    renderPlayerSelection();

    filterRow.querySelectorAll('.conv-filter-btn').forEach(fb => {
      fb.addEventListener('click', () => {
        filterRow.querySelectorAll('.conv-filter-btn').forEach(b => b.classList.remove('active'));
        fb.classList.add('active');
        activeGroupFilter = fb.dataset.gkey;
        renderPlayerSelection();
      });
    });

    // Toggle convocato
    playerArea.addEventListener('click', e => {
      const pb = e.target.closest('.conv-player-btn');
      if (!pb) return;
      const pid = pb.dataset.pid;
      const pRef = convocatiRef.child(pb.dataset.partita).child(pid);
      if (pb.classList.contains('convocato')) {
        pRef.remove().catch(() => showToast('❌ Errore'));
      } else {
        pRef.set(true).catch(() => showToast('❌ Errore'));
      }
    });
  }

  // Rimozione convocato (solo admin – x sui chip)
  if (admin) {
    section.querySelectorAll('.conv-chip-remove').forEach(btn => {
      btn.addEventListener('click', () => {
        convocatiRef.child(btn.dataset.partita).child(btn.dataset.pid).remove()
          .catch(() => showToast('❌ Errore'));
      });
    });
  }
}

// Filtri
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    render();
  });
});

function resetForm() {
  editingId = null;
  document.getElementById('f-data').value = '';
  document.getElementById('f-ora').value = '';
  document.getElementById('f-ora-evento').value = '';
  document.getElementById('f-avversario').value = '';
  document.getElementById('f-risultato').value = '';
  document.getElementById('f-citta').value = '';
  document.getElementById('f-indirizzo').value = '';
  document.getElementById('f-descrizione').value = '';
  document.getElementById('f-nome-evento').value = '';
  document.getElementById('trasferta-fields').style.display = 'none';
  toggleFestaFields(false);
  document.querySelector('.manager-panel h3').textContent = '➕ Aggiungi Partita';
  document.getElementById('add-btn').textContent = '➕ Aggiungi partita';
  document.getElementById('cancel-edit-btn').style.display = 'none';
}

function toggleFestaFields(isFesta) {
  document.getElementById('partita-fields').style.display = isFesta ? 'none' : 'block';
  document.getElementById('festa-fields').style.display = isFesta ? 'block' : 'none';
}

// Aggiungi / modifica partita
document.getElementById('add-btn').addEventListener('click', () => {
  const data       = document.getElementById('f-data').value;
  const campionato = document.getElementById('f-campionato').value;
  const isFesta    = campionato === 'Festa';
  const ora        = isFesta
    ? document.getElementById('f-ora-evento').value
    : document.getElementById('f-ora').value;
  const avversario = document.getElementById('f-avversario').value.trim();
  const luogo      = document.getElementById('f-luogo').value;
  const risultato  = document.getElementById('f-risultato').value.trim();
  const citta      = document.getElementById('f-citta').value.trim();
  const indirizzo  = document.getElementById('f-indirizzo').value.trim();
  const descrizione = document.getElementById('f-descrizione').value.trim();
  if (!data) { showToast('⚠️ Inserisci la data!'); return; }
  if (isFesta && !ora) { showToast("⚠️ Inserisci l'orario evento!"); return; }
  if (!isFesta && !avversario) { showToast('⚠️ Inserisci l\'avversario!'); return; }
  let entry;
  if (isFesta) {
    entry = { data, ora, campionato, nomeEvento: document.getElementById('f-nome-evento').value.trim() || 'Festa', descrizione };
  } else {
    entry = { data, ora, campionato, avversario, luogo, risultato };
    if (luogo === 'trasferta') {
      entry.citta = citta || '';
      entry.indirizzo = indirizzo || '';
    }
  }
  if (editingId) {
    calRef.child(editingId).update(entry)
      .then(() => { resetForm(); showToast('✅ ' + (isFesta ? 'Festa' : 'Partita') + ' aggiornata!'); })
      .catch(() => showToast('❌ Errore nel salvataggio'));
  } else {
    calRef.push(entry)
      .then(() => { resetForm(); showToast('✅ ' + (isFesta ? 'Festa' : 'Partita') + ' aggiunta!'); })
      .catch(() => showToast('❌ Errore nel salvataggio'));
  }
});

document.getElementById('cancel-edit-btn').addEventListener('click', resetForm);

// Mostra/nascondi campi trasferta
document.getElementById('f-luogo').addEventListener('change', function() {
  document.getElementById('trasferta-fields').style.display = this.value === 'trasferta' ? 'block' : 'none';
});

// Mostra/nascondi campi festa vs partita
document.getElementById('f-campionato').addEventListener('change', function() {
  const isFesta = this.value === 'Festa';
  toggleFestaFields(isFesta);
  document.querySelector('.manager-panel h3').textContent = editingId
    ? (isFesta ? '✏️ Modifica Festa' : '✏️ Modifica Partita')
    : (isFesta ? '➕ Aggiungi Festa' : '➕ Aggiungi Partita');
  document.getElementById('add-btn').textContent = editingId
    ? '💾 Salva modifiche'
    : (isFesta ? '➕ Aggiungi festa' : '➕ Aggiungi partita');
});

// PIN
const pinBtn = document.getElementById('pin-btn');
const overlay = document.getElementById('modal-overlay');
function updatePinBtn() { pinBtn.textContent = isManager() ? '🔐' : '🔒'; }
updatePinBtn();
if (isManager()) document.getElementById('manager-panel').classList.add('visible');

pinBtn.addEventListener('click', () => {
  if (isManager()) {
    setManager(false); document.getElementById('manager-panel').classList.remove('visible');
    updatePinBtn(); render(); showToast('🔐 Logout gestore effettuato');
  } else {
    document.getElementById('modal-error').textContent = '';
    document.getElementById('pin-input').value = '';
    document.getElementById('pin-input').type = 'password';
    document.getElementById('pin-toggle').textContent = '👁️';
    overlay.classList.add('open');
    setTimeout(() => document.getElementById('pin-input').focus(), 100);
  }
});
document.getElementById('modal-cancel').addEventListener('click', () => overlay.classList.remove('open'));
overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('open'); });
document.getElementById('modal-confirm').addEventListener('click', checkPin);
document.getElementById('pin-input').addEventListener('keydown', e => { if (e.key === 'Enter') checkPin(); });
document.getElementById('pin-toggle').addEventListener('click', () => {
  const inp = document.getElementById('pin-input');
  const tog = document.getElementById('pin-toggle');
  if (inp.type === 'password') { inp.type = 'text'; tog.textContent = '🙈'; }
  else { inp.type = 'password'; tog.textContent = '👁️'; }
});

function checkPin() {
  if (document.getElementById('pin-input').value === 'nekton2026') {
    setManager(true); overlay.classList.remove('open');
    document.getElementById('manager-panel').classList.add('visible'); updatePinBtn();
    render(); showToast('🔓 Modalità gestore attiva');
  } else { document.getElementById('modal-error').textContent = '❌ PIN non corretto'; }
}
</script>

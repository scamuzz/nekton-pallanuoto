<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>?? Acquagol — Nekton</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; overflow-x: hidden; }
    body { font-family: 'Segoe UI', sans-serif; background: #e0f7fa; min-height: 100vh; }

    .header {
      background: linear-gradient(160deg, #006994 0%, #00b4d8 60%, #4dd0e1 100%);
      color: white; padding: 36px 20px 24px;
      text-align: center; position: relative; overflow: hidden;
    }
    .header::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse 60% 40% at 20% 30%, rgba(255,255,255,0.12), transparent),
                  radial-gradient(ellipse 50% 35% at 80% 70%, rgba(255,255,255,0.07), transparent);
    }
    .back-link {
      position: absolute; top: 14px; left: 14px;
      background: rgba(255,255,255,0.25); border-radius: 20px;
      padding: 7px 15px; font-size: 0.76rem; font-weight: 700;
      color: white; text-decoration: none; z-index: 2; backdrop-filter: blur(4px);
      transition: background 0.2s;
    }
    .back-link:hover { background: rgba(255,255,255,0.40); }
    .pin-btn {
      position: absolute; top: 14px; right: 14px;
      background: rgba(255,255,255,0.25); border: none; border-radius: 50%;
      width: 40px; height: 40px; font-size: 1.3rem; cursor: pointer; z-index: 2;
      backdrop-filter: blur(4px); color: white; transition: background 0.2s;
    }
    .pin-btn:hover { background: rgba(255,255,255,0.40); }
    .header .icons { font-size: 3rem; display: block; margin-bottom: 10px; position: relative; }
    .header h1 { font-size: 1.6rem; font-weight: 800; position: relative; }
    .header .subtitle { font-size: 0.82rem; opacity: 0.9; margin-top: 6px; position: relative; }
    .sync-status { display: flex; align-items: center; justify-content: center;
      gap: 6px; font-size: 0.7rem; margin-top: 10px; opacity: 0.95; position: relative; }
    .sync-dot { width: 8px; height: 8px; border-radius: 50%;
      background: white; animation: blink 1.5s infinite; flex-shrink: 0; }
    .sync-dot.connected { background: #69f0ae; animation: none; }
    .sync-dot.error { background: #ff5252; animation: none; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

    .wave-divider { display: block; line-height: 0; overflow: hidden;
      background: linear-gradient(160deg, #006994 0%, #00b4d8 60%, #4dd0e1 100%); }
    .wave-divider svg { display: block; width: 100%; }
    .container { max-width: 540px; margin: 0 auto; padding: 16px 12px 64px; }

    /* NEWS CARDS */
    .news-card {
      background: white; border-radius: 18px; padding: 18px;
      margin-bottom: 14px; box-shadow: 0 4px 18px rgba(0,105,148,0.08);
      border: 2px solid #b2ebf2; border-left: 5px solid #00b4d8;
      position: relative;
    }
    .news-meta { font-size: 0.68rem; color: #0097a7; font-weight: 700; margin-bottom: 6px; }
    .news-title { font-size: 1rem; font-weight: 800; color: #006994; margin-bottom: 8px; }
    .news-text { font-size: 0.85rem; color: #455a64; line-height: 1.65; white-space: pre-line; }
    .news-del-btn {
      position: absolute; top: 14px; right: 14px;
      background: none; border: none; color: #b2dfdb; cursor: pointer;
      font-size: 1rem; transition: color 0.2s;
    }
    .news-del-btn:hover { color: #e53935; }

    .no-news {
      text-align: center; font-size: 0.88rem; color: #80cbc4; font-style: italic;
      padding: 30px 10px; background: white; border-radius: 16px;
      border: 2px dashed #b2ebf2; margin-bottom: 16px;
    }

    /* SECTION TITLE */
    .section-title {
      font-size: 0.78rem; font-weight: 800; color: #006994;
      text-transform: uppercase; letter-spacing: 1px; margin: 20px 0 14px 2px;
      display: flex; align-items: center; gap: 6px;
    }
    .section-title::after { content: ''; flex: 1; height: 2px;
      background: linear-gradient(90deg, #b2ebf2 0%, transparent 100%); }

    /* PANNELLO GESTORE */
    .manager-panel {
      display: none; background: #fff8e1; border-radius: 18px;
      padding: 18px; margin-bottom: 18px; border: 2px solid #ffe082;
    }
    .manager-panel.visible { display: block; }
    .manager-panel h3 { font-size: 0.76rem; color: #f57f17; text-transform: uppercase;
      letter-spacing: 0.9px; font-weight: 800; margin-bottom: 12px; }
    .form-group { margin-bottom: 10px; }
    .form-group label { font-size: 0.75rem; font-weight: 700; color: #555; display: block; margin-bottom: 4px; }
    .form-input {
      width: 100%; border: 1.5px solid #ffe082; border-radius: 10px;
      padding: 9px 12px; font-size: 0.88rem; font-family: inherit;
      color: #333; outline: none; background: white;
    }
    .form-input:focus { border-color: #ffb300; }
    textarea.form-input { min-height: 90px; resize: vertical; }
    .pub-btn {
      width: 100%; background: linear-gradient(135deg, #006994, #00b4d8); color: white;
      border: none; border-radius: 10px; padding: 11px; font-size: 0.86rem;
      font-weight: 700; cursor: pointer; margin-top: 6px; font-family: inherit;
    }
    .pub-btn:hover { opacity: 0.9; }

    /* PIN MODAL */
    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      z-index: 100; align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: white; border-radius: 20px; padding: 28px 24px;
      max-width: 300px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.3); text-align: center;
    }
    .modal h3 { font-size: 1rem; font-weight: 800; color: #006994; margin-bottom: 8px; }
    .modal p { font-size: 0.78rem; color: #607d8b; margin-bottom: 16px; }
    .modal input {
      width: 100%; border: 2px solid #b2ebf2; border-radius: 10px;
      padding: 11px 14px; font-size: 1rem; text-align: center;
      letter-spacing: 2px; outline: none; font-family: inherit;
    }
    .modal input:focus { border-color: #006994; }
    .modal-btns { display: flex; gap: 10px; margin-top: 14px; }
    .modal-btn { flex: 1; padding: 11px; border: none; border-radius: 10px;
      font-size: 0.86rem; font-weight: 700; cursor: pointer; font-family: inherit; }
    .modal-btn.primary { background: linear-gradient(135deg, #006994, #00b4d8); color: white; }
    .modal-btn.secondary { background: #eceff1; color: #607d8b; }
    .modal-error { font-size: 0.75rem; color: #e53935; margin-top: 8px; }

    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px);
      background: #006994; color: white; padding: 10px 22px; border-radius: 24px;
      font-size: 0.83rem; font-weight: 600; transition: transform 0.3s ease; z-index: 999;
      box-shadow: 0 6px 24px rgba(0,105,148,0.3); white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .page-footer { text-align: center; font-size: 0.7rem; color: #80cbc4; padding: 20px 0; }
  </style>
</head>
<body>

<div class="header">
  <a class="back-link" href="index.html">&#8592; Home</a>
  <button class="pin-btn" id="pin-btn">??</button>
  <span class="icons">??</span>
  <h1>Acquagol</h1>
  <div class="subtitle">Nati 2016 e seguenti</div>
  <div class="sync-status">
    <div class="sync-dot" id="sync-dot"></div>
    <span id="sync-label">Connessione in corso…</span>
  </div>
</div>

<div class="wave-divider">
  <svg viewBox="0 0 1440 72" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M0,36 C180,72 360,0 540,36 C720,72 900,0 1080,36 C1260,72 1380,12 1440,36 L1440,72 L0,72 Z" fill="#e0f7fa"/>
  </svg>
</div>

<div class="container">

  <!-- PANNELLO GESTORE -->
  <div class="manager-panel" id="manager-panel">
    <h3>?? Pubblica una notizia</h3>
    <div class="form-group">
      <label>Titolo</label>
      <input type="text" class="form-input" id="news-title" placeholder="Titolo della notizia…" maxlength="100"/>
    </div>
    <div class="form-group">
      <label>Testo</label>
      <textarea class="form-input" id="news-text" placeholder="Scrivi il messaggio per il gruppo Acquagol…"></textarea>
    </div>
    <button class="pub-btn" id="pub-btn">?? Pubblica notizia</button>
  </div>

  <div class="section-title">?? Notizie e Avvisi</div>
  <div id="news-container"></div>

</div>

<div class="page-footer">?? Acquagol — Nekton Pallanuoto</div>
<div class="toast" id="toast"></div>

<!-- MODALE PIN -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3>?? Accesso Gestore</h3>
    <p>Inserisci il PIN per pubblicare notizie</p>
    <input type="password" id="pin-input" placeholder="••••••••" maxlength="20" autocomplete="off"/>
    <div class="modal-error" id="modal-error"></div>
    <div class="modal-btns">
      <button class="modal-btn secondary" id="modal-cancel">Annulla</button>
      <button class="modal-btn primary" id="modal-confirm">Accedi</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey: "AIzaSyAfOMeAkXUIandLUhCR8nfyELOPVRyD3WU",
  authDomain: "lista-spesa-b9eb1.firebaseapp.com",
  databaseURL: "https://lista-spesa-b9eb1-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "lista-spesa-b9eb1",
  storageBucket: "lista-spesa-b9eb1.firebasestorage.app",
  messagingSenderId: "468690890938",
  appId: "1:468690890938:web:048be7f27779d8862d9283"
});
const db = firebase.database();
const newsRef = db.ref('nekton/news/acquagol');

function isManager() { return sessionStorage.getItem('nektonManager') === '1'; }
function setManager(v) { sessionStorage.setItem('nektonManager', v ? '1' : '0'); }

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2600);
}

// Firebase connection status
db.ref('.info/connected').on('value', snap => {
  const dot = document.getElementById('sync-dot');
  const lbl = document.getElementById('sync-label');
  if (snap.val()) { dot.className = 'sync-dot connected'; lbl.textContent = '?? Sincronizzato in tempo reale'; }
  else { dot.className = 'sync-dot error'; lbl.textContent = '?? Offline — riconnessione…'; }
});

// Load news
newsRef.orderByChild('data').on('value', snap => {
  const data = snap.val() || {};
  renderNews(data);
});

function renderNews(data) {
  const container = document.getElementById('news-container');
  const entries = Object.entries(data).sort((a,b) => (b[1].data||'').localeCompare(a[1].data||''));
  if (entries.length === 0) {
    container.innerHTML = '<div class="no-news">Nessuna notizia al momento. ??</div>';
    return;
  }
  container.innerHTML = '';
  entries.forEach(([id, item]) => {
    const d = new Date(item.data);
    const dateStr = isNaN(d) ? item.data : d.toLocaleDateString('it-IT', { day:'2-digit', month:'long', year:'numeric' });
    const card = document.createElement('div');
    card.className = 'news-card';
    card.innerHTML = `
      <div class="news-meta">?? ${esc(dateStr)}</div>
      <div class="news-title">${esc(item.titolo)}</div>
      <div class="news-text">${esc(item.testo)}</div>
      ${isManager() ? `<button class="news-del-btn" data-id="${esc(id)}" title="Elimina">???</button>` : ''}
    `;
    container.appendChild(card);
  });
  if (isManager()) {
    document.querySelectorAll('.news-del-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        if (confirm('Eliminare questa notizia?')) {
          newsRef.child(btn.dataset.id).remove();
          showToast('??? Notizia eliminata');
        }
      });
    });
  }
}

// Publish news
document.getElementById('pub-btn').addEventListener('click', () => {
  const titolo = document.getElementById('news-title').value.trim();
  const testo  = document.getElementById('news-text').value.trim();
  if (!titolo) { showToast('?? Inserisci un titolo!'); return; }
  if (!testo)  { showToast('?? Inserisci il testo!'); return; }
  const now = new Date().toISOString().slice(0,10);
  newsRef.push({ titolo, testo, data: now }).then(() => {
    document.getElementById('news-title').value = '';
    document.getElementById('news-text').value = '';
    showToast('? Notizia pubblicata!');
  }).catch(() => showToast('? Errore nel salvataggio'));
});

// PIN
const pinBtn = document.getElementById('pin-btn');
const overlay = document.getElementById('modal-overlay');
function updatePinBtn() { pinBtn.textContent = isManager() ? '??' : '??'; }
updatePinBtn();
if (isManager()) document.getElementById('manager-panel').classList.add('visible');

pinBtn.addEventListener('click', () => {
  if (isManager()) {
    setManager(false);
    document.getElementById('manager-panel').classList.remove('visible');
    updatePinBtn();
    newsRef.orderByChild('data').once('value', snap => renderNews(snap.val() || {}));
    showToast('?? Logout gestore effettuato');
  } else {
    document.getElementById('modal-error').textContent = '';
    document.getElementById('pin-input').value = '';
    overlay.classList.add('open');
    setTimeout(() => document.getElementById('pin-input').focus(), 100);
  }
});
document.getElementById('modal-cancel').addEventListener('click', () => overlay.classList.remove('open'));
overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('open'); });
document.getElementById('modal-confirm').addEventListener('click', checkPin);
document.getElementById('pin-input').addEventListener('keydown', e => { if (e.key === 'Enter') checkPin(); });

function checkPin() {
  if (document.getElementById('pin-input').value === 'nekton2025') {
    setManager(true);
    overlay.classList.remove('open');
    document.getElementById('manager-panel').classList.add('visible');
    updatePinBtn();
    newsRef.orderByChild('data').once('value', snap => renderNews(snap.val() || {}));
    showToast('? Modalitŕ gestore attiva');
  } else {
    document.getElementById('modal-error').textContent = '? PIN non corretto';
  }
}
</script>
</body>
</html>
